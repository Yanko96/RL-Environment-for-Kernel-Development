name: Verify Containerfile builds and push to GHCR

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write   # required to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space on runner (aggressive)
        # ubuntu-latest has ~14 GB free disk by default. Our image weighs
        # ~8 GB after building two venvs (agent + judge) with cu128 torch
        # plus nvidia runtime libs; export tarballs roughly double that.
        # Use the well-maintained "free-disk-space" action which strips
        # ~35 GB of preinstalled tooling we don't need.
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build container image (load locally for smoke test)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          load: true
          tags: pm_env_test:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test imports inside built image
        run: |
          docker run --rm pm_env_test:smoke bash -c '
            python --version &&
            python -c "import torch; print(\"torch:\", torch.__version__)" &&
            python -c "import triton; print(\"triton:\", triton.__version__)" &&
            python -c "import numpy; print(\"numpy:\", numpy.__version__)"
          '

      - name: Verify gcc is available (Triton runtime requirement)
        run: |
          docker run --rm pm_env_test:smoke bash -c '
            which gcc && gcc --version | head -1
          '

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
